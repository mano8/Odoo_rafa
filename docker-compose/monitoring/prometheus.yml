global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: hw_proxy
    static_configs:
      # MGMT_IP: if you change the management interface IP, update this target,
      # hw_proxy.service --host, traefik/dynamic_conf.yml, and MGMT_IP in .env.
      - targets: ["10.254.254.1:9002"]
        labels:
          service: hw_proxy
          stack: odoo_prod
    metrics_path: /hw_proxy/metrics
