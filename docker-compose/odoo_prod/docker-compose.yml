services:
  traefik:
    image: traefik:v3.4.0
    ports:
      - "8000:80"
      - "4430:443"
      - "8080:8080"   # Treafik Dashboard
      - "9000:9000"   # odoo entryPoint
      - "9001:9001"   # hw_proxy entryPoint
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic_conf.yml:/etc/traefik/dynamic_conf.yml:ro
      - ./traefik/certs:/etc/traefik/certs:ro
      - ./traefik/acme.json:/etc/traefik/acme.json
    logging:
      driver: "journald"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - odoo_network
      - monitoring_shared

  fiesta_db:
    image: postgres:13.21-alpine3.20
    # set shared memory limit when using docker compose
    shm_size: 128mb
    volumes:
      - ./postgres/pgdata:/var/lib/postgresql/data/pgdata
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: "journald"
    restart: unless-stopped
    networks:
      - odoo_network

  hw_status_service:
    build:
      context: ../../hw_status
      dockerfile: ./hw_status/Dockerfile.offline
    env_file:
      - ./hw_status.env
    environment:
      ENVIRONMENT: production
      SET_OPEN_API: false
      SET_DOCS: false
      SET_REDOC: false
      PRINTER_KEY: "PP6800"
    volumes:
      - ../../hw_status/hw_status:/opt/hw_status
      - ./hw_status.env:/opt/hw_status/.env:ro
    userns_mode: "host"
    logging:
      driver: "journald"
    restart: unless-stopped
    networks:
      - odoo_network

  fiesta_odoo:
    image: odoo:18.0
    volumes:
      - ./odoo/data:/var/lib/odoo
      - ./odoo/config:/etc/odoo
      - ./odoo/addons:/mnt/extra-addons
      - ./odoo/fonts.scss:/usr/lib/python3/dist-packages/odoo/addons/web/static/fonts/fonts.scss
    command: >
      bash -c '
        export PGPASSWORD="$DB_PASSWORD"
        if psql -h "$DB_HOST" -U "$DB_USER" -d "$DB_DATABASE" -tAc "SELECT 1 FROM res_users LIMIT 1;" 2>/dev/null | grep -q 1; then
          echo "Database odoo exists, starting normally...";
          exec odoo --database "$DB_DATABASE" --db_host=fiesta_db --db_user "$DB_USER" --db_password "$DB_PASSWORD" -u pos_indv_receipt --dev=css;
        else
          echo "Database odoo missing — initializing...";
          odoo -i base,pos_indv_receipt --without-demo=True --database "$DB_DATABASE" --db_host=fiesta_db --db_user "$DB_USER" --db_password "$DB_PASSWORD" --stop-after-init &&
          exec odoo --database "$DB_DATABASE" --db_host=fiesta_db --db_user "$DB_USER" --db_password "$DB_PASSWORD";
        fi
      '
    extra_hosts:
      - "fonts.odoo.com:${HOST_IP:-192.168.1.146}"
    logging:
      driver: "journald"
    depends_on:
      fiesta_db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - odoo_network

networks:
  odoo_network:
    driver: bridge
  monitoring_shared:
    external: true