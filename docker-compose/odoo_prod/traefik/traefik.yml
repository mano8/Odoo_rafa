# traefik.yml — Development
log:
  level: DEBUG



providers:
  file:
    filename: /etc/traefik/dynamic_conf.yml
    watch: true

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"
    http3: {}            # Enable HTTP/3
  api:
    address: ":9000"
    http3: {}
  hw:
    address: ":9001"
    http3: {}
    forwardedHeaders:
      insecure: true