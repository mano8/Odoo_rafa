# dynamic_conf.yml — Development
tls:
  certificates:
    - certFile: "/etc/traefik/certs/local-cert.crt"
      keyFile:  "/etc/traefik/certs/local-cert.key"
  stores:
    default:
      defaultCertificate:
        certFile: "/etc/traefik/certs/local-cert.crt"
        keyFile:  "/etc/traefik/certs/local-cert.key"

  options:
    default:
      minVersion: VersionTLS12

http:

  # 1) Dashboard router — only on websecure, only from localhost
  routers:
    # Odoo-Service router
    odoo-router:
      entryPoints:
        - api
      rule: "(Host(`traefik-client.local`) || Host(`192.168.1.146`) || Host(`127.0.0.1`)) && PathPrefix(`/`)"
      service: odoo-service
      tls: {}

    # Hw_proxy Service router
    hw-proxy-router:
      entryPoints:
        - hw
      rule: "(Host(`traefik-client.local`) || Host(`192.168.1.146`) || Host(`127.0.0.1`)) && PathPrefix(`/hw_proxy`)"
      service: hw-proxy-service
      tls: {}

    # Hw_status Service router
    hw-status-router:
      entryPoints:
        - hw
      rule: "(Host(`traefik-client.local`) || Host(`192.168.1.146`) || Host(`127.0.0.1`)) && PathPrefix(`/hw_status`)"
      service: hw-status-service
      tls: {}

    # Grafana router — priority 100 wins over odoo-router PathPrefix('/') catch-all
    grafana-router:
      entryPoints:
        - api
      rule: "PathPrefix(`/grafana`)"
      priority: 100
      service: grafana-service
      middlewares:
        - grafana-security
        - grafana-retry
      tls: {}

  services:
    odoo-service:
      loadBalancer:
        servers:
          - url: "http://fiesta_odoo:8069"
    hw-proxy-service:
      loadBalancer:
        servers:
          - url: "http://10.254.254.1:9002"
    hw-status-service:
      loadBalancer:
        servers:
          - url: "http://hw_status_service:8015"

    grafana-service:
      loadBalancer:
        servers:
          # 'grafana' resolves via Docker embedded DNS on monitoring_shared network
          - url: "http://grafana:3000"

  middlewares:
    ip-allowlist:
      IPAllowList:
        # Only allow dashboard from the Docker host itself
        sourceRange:
          - "127.0.0.1/32"
          - "::1/128"

    grafana-security:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-XSS-Protection: "1; mode=block"

    grafana-retry:
      retry:
        attempts: 3
        initialInterval: "500ms"