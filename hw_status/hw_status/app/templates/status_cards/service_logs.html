<div class="col-12">
    <div class="card">
        <div class="card-body d-flex flex-column">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-2">
                <h2 class="card-title h5 mb-0">Registros de Errores</h2>
                <div class="d-flex align-items-center gap-2">
                    <label for="selectLogService" class="form-label small fw-medium mb-0">Servicio:</label>
                    <select id="selectLogService" class="form-select form-select-sm" style="width: auto; min-width: 180px;">
                        <optgroup label="Sistema (systemd)">
                            <option value="hw_proxy">hw_proxy</option>
                            <option value="odoo-pos">odoo-pos</option>
                            <option value="monitoring">monitoring</option>
                        </optgroup>
                        <optgroup label="Docker (odoo_prod)">
                            <option value="fiesta_odoo">fiesta_odoo (Odoo)</option>
                            <option value="fiesta_db">fiesta_db (Postgres)</option>
                            <option value="traefik">traefik</option>
                            <option value="hw_status_service">hw_status_service</option>
                        </optgroup>
                        <optgroup label="Docker (monitoring)">
                            <option value="grafana">grafana</option>
                            <option value="prometheus">prometheus</option>
                        </optgroup>
                    </select>
                    <button id="btnRefreshServiceLogs" class="btn btn-sm btn-outline-secondary" title="Actualizar registros">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <button id="btnExpandServiceLogs" class="btn btn-sm btn-outline-secondary" title="Expandir" style="display:none;">
                        <i class="fas fa-expand-arrows-alt"></i>
                    </button>
                </div>
            </div>
            <div class="log-output-container d-flex flex-column">
                <pre id="logOutputService" class="service-log-pre service-log-fullwidth">Seleccione un servicio y pulse Actualizar.</pre>
            </div>
        </div>
    </div>
</div>
